<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Synaptic torus - circular toroidal shape -->
  <g transform="translate(200, 170)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.7"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.5"/>

    <!-- Toroidal bridges (connecting inner to outer) -->
    <line x1="0" y1="-42" x2="0" y2="-22" stroke="#818CF8" stroke-width="2" opacity="0.5"/>
    <line x1="36" y1="-21" x2="19" y2="-11" stroke="#818CF8" stroke-width="2" opacity="0.5"/>
    <line x1="36" y1="21" x2="19" y2="11" stroke="#818CF8" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="42" x2="0" y2="22" stroke="#818CF8" stroke-width="2" opacity="0.5"/>
    <line x1="-36" y1="21" x2="-19" y2="11" stroke="#818CF8" stroke-width="2" opacity="0.5"/>
    <line x1="-36" y1="-21" x2="-19" y2="-11" stroke="#818CF8" stroke-width="2" opacity="0.5"/>

    <!-- Core node -->
    <g filter="url(#glowStrong)">
      <circle cx="0" cy="0" r="4" fill="url(#nodeGrad)"/>
      <circle cx="0" cy="0" r="9" fill="#818CF8" opacity="0.12"/>
      <circle cx="0" cy="0" r="14" fill="none" stroke="#818CF8" stroke-width="0.6" opacity="0.2">
        <animate attributeName="r" values="12;18;12" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.25;0;0.25" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Synaptic signal arcs (neural transmission) -->
    <path d="M 18 -11 Q 28 0 18 11" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
    <path d="M -18 -11 Q -28 0 -18 11" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,3"/>
  </g>

  <!-- Outer memory nodes -->
  <g filter="url(#glowStrong)">
    <circle cx="200" cy="120" r="3" fill="url(#nodeGrad)"/>
    <circle cx="252" cy="149" r="3" fill="url(#nodeGrad)"/>
    <circle cx="252" cy="191" r="3" fill="url(#nodeGrad)"/>
    <circle cx="200" cy="220" r="3" fill="url(#nodeGrad)"/>
    <circle cx="148" cy="191" r="3" fill="url(#nodeGrad)"/>
    <circle cx="148" cy="149" r="3" fill="url(#nodeGrad)"/>
  </g>

  <!-- Node connection pathways -->
  <g filter="url(#glow)" opacity="0.25">
    <line x1="200" y1="120" x2="200" y2="128" stroke="#818CF8" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="252" y1="149" x2="238" y2="156" stroke="#818CF8" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="252" y1="191" x2="238" y2="184" stroke="#818CF8" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="200" y1="220" x2="200" y2="212" stroke="#818CF8" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="148" y1="191" x2="162" y2="184" stroke="#818CF8" stroke-width="1" stroke-dasharray="2,3"/>
    <line x1="148" y1="149" x2="162" y2="156" stroke="#818CF8" stroke-width="1" stroke-dasharray="2,3"/>
  </g>

  <!-- Text -->
  <text x="200" y="305" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#818CF8" filter="url(#glow)">SYNAPSIS</text>
  <text x="200" y="330" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="400" fill="#A78BFA" letter-spacing="5">MEMORY ENGINE</text>
</svg>
