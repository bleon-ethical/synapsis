<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A"/>
      <stop offset="100%" stop-color="#0F0F2E"/>
    </linearGradient>
    <linearGradient id="presGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1B4B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1E1B4B" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F2E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0F0F2E" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A1A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A0A1A" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowPres" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366F1"/>
    </marker>
    <marker id="arrowCore" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A78BFA"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="660" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#818CF8" filter="url(#glow)">Synapsis Architecture</text>

  <!-- Presentation Layer Box -->
  <rect x="50" y="70" width="1000" height="110" rx="8" fill="url(#presGrad)" stroke="#818CF8" stroke-width="1.5"/>
  <text x="70" y="90" font-size="11" font-weight="600" fill="#A78BFA">PRESENTATION LAYER</text>

  <rect x="80" y="100" width="180" height="56" rx="6" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
  <text x="170" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">MCP Server</text>
  <text x="170" y="142" text-anchor="middle" font-size="10" fill="#818CF8">HTTP/SSE + Stdio</text>

  <rect x="300" y="100" width="180" height="56" rx="6" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
  <text x="390" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">CLI</text>
  <text x="390" y="142" text-anchor="middle" font-size="10" fill="#818CF8">Command Line Interface</text>

  <rect x="520" y="100" width="180" height="56" rx="6" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
  <text x="610" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">TUI</text>
  <text x="610" y="142" text-anchor="middle" font-size="10" fill="#818CF8">Terminal UI</text>

  <rect x="740" y="100" width="180" height="56" rx="6" fill="#312E81" stroke="#6366F1" stroke-width="1"/>
  <text x="830" y="124" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">HTTP Transport</text>
  <text x="830" y="142" text-anchor="middle" font-size="10" fill="#818CF8">SSE / REST</text>

  <!-- Arrow down from Presentation -->
  <line x1="170" y1="156" x2="170" y2="230" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowPres)"/>
  <line x1="390" y1="156" x2="390" y2="230" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowPres)"/>

  <!-- Core Layer Box -->
  <rect x="50" y="230" width="1000" height="200" rx="8" fill="url(#coreGrad)" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="70" y="252" font-size="11" font-weight="600" fill="#A78BFA">CORE (BUSINESS LOGIC)</text>

  <!-- Row 1 -->
  <rect x="80" y="268" width="200" height="54" rx="6" fill="#1E1B4B" stroke="#A78BFA" stroke-width="1"/>
  <text x="180" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Orchestrator</text>
  <text x="180" y="309" text-anchor="middle" font-size="10" fill="#818CF8">Agent / Task / Message routing</text>

  <rect x="310" y="268" width="200" height="54" rx="6" fill="#1E1B4B" stroke="#A78BFA" stroke-width="1"/>
  <text x="410" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Worker Pool</text>
  <text x="410" y="309" text-anchor="middle" font-size="10" fill="#818CF8">Shell / File / Code / Git / Search</text>

  <rect x="540" y="268" width="200" height="54" rx="6" fill="#1E1B4B" stroke="#A78BFA" stroke-width="1"/>
  <text x="640" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Task Queue</text>
  <text x="640" y="309" text-anchor="middle" font-size="10" fill="#818CF8">Priority / Auto-assign / Retry</text>

  <rect x="770" y="268" width="200" height="54" rx="6" fill="#1E1B4B" stroke="#A78BFA" stroke-width="1"/>
  <text x="870" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Auth &amp; Security</text>
  <text x="870" y="309" text-anchor="middle" font-size="10" fill="#818CF8">TPM / PQC / Access Control</text>

  <!-- Row 2 -->
  <rect x="80" y="340" width="200" height="54" rx="6" fill="#1E1B4B" stroke="#A78BFA" stroke-width="1"/>
  <text x="180" y="363" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Agent Connectors</text>
  <text x="180" y="381" text-anchor="middle" font-size="10" fill="#818CF8">OpenCode / Qwen / Claude</text>

  <rect x="310" y="340" width="200" height="54" rx="6" fill="#1E1B4B" stroke="#A78BFA" stroke-width="1"/>
  <text x="410" y="363" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Watchdog</text>
  <text x="410" y="381" text-anchor="middle" font-size="10" fill="#818CF8">FS Integrity / Event Monitoring</text>

  <rect x="540" y="340" width="200" height="54" rx="6" fill="#1E1B4B" stroke="#A78BFA" stroke-width="1"/>
  <text x="640" y="363" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Recycle Bin</text>
  <text x="640" y="381" text-anchor="middle" font-size="10" fill="#818CF8">TTL / Categorization / Undelete</text>

  <rect x="770" y="340" width="200" height="54" rx="6" fill="#1E1B4B" stroke="#A78BFA" stroke-width="1"/>
  <text x="870" y="363" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Rate Limiter</text>
  <text x="870" y="381" text-anchor="middle" font-size="10" fill="#818CF8">Throttling / Circuit Breaker</text>

  <!-- Arrow down from Core -->
  <line x1="550" y1="430" x2="550" y2="465" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrowCore)" stroke-dasharray="6,4"/>

  <!-- Infrastructure Layer Box -->
  <rect x="50" y="470" width="1000" height="120" rx="8" fill="url(#infraGrad)" stroke="#6366F1" stroke-width="1.5"/>
  <text x="70" y="492" font-size="11" font-weight="600" fill="#818CF8">INFRASTRUCTURE (STORAGE)</text>

  <rect x="80" y="508" width="200" height="56" rx="6" fill="#1E1B4B" stroke="#6366F1" stroke-width="1"/>
  <text x="180" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">SQLite + FTS5</text>
  <text x="180" y="552" text-anchor="middle" font-size="10" fill="#818CF8">Observations / Sessions / Tasks</text>

  <rect x="310" y="508" width="200" height="56" rx="6" fill="#1E1B4B" stroke="#6366F1" stroke-width="1"/>
  <text x="410" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Agent Registry</text>
  <text x="410" y="552" text-anchor="middle" font-size="10" fill="#818CF8">Skills / Capacity / Discovery</text>

  <rect x="540" y="508" width="200" height="56" rx="6" fill="#1E1B4B" stroke="#6366F1" stroke-width="1"/>
  <text x="640" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">Context Registry</text>
  <text x="640" y="552" text-anchor="middle" font-size="10" fill="#818CF8">Tiered / Compression / Isolation</text>

  <rect x="770" y="508" width="200" height="56" rx="6" fill="#1E1B4B" stroke="#6366F1" stroke-width="1"/>
  <text x="870" y="534" text-anchor="middle" font-size="13" font-weight="600" fill="#E0E0FF">PQC Vault</text>
  <text x="870" y="552" text-anchor="middle" font-size="10" fill="#818CF8">AES-256-GCM / Key Derivation</text>

  <!-- AI Agents box on the right -->
  <rect x="950" y="85" width="120" height="56" rx="6" fill="#312E81" stroke="#818CF8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1010" y="109" text-anchor="middle" font-size="12" font-weight="600" fill="#A78BFA">AI Agents</text>
  <text x="1010" y="127" text-anchor="middle" font-size="10" fill="#818CF8">MCP Protocol</text>

  <!-- Connector line to MCP Server -->
  <line x1="920" y1="128" x2="950" y2="128" stroke="#818CF8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="935" y="140" text-anchor="middle" font-size="9" fill="#6366F1">MCP</text>
</svg>
