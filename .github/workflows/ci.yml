name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone synapsis-core
        run: git clone --depth 1 https://github.com/MethodWhite/synapsis-core.git synapsis-core

      - name: Clone prusia-vault
        run: git clone --depth 1 https://github.com/MethodWhite/prusia-vault.git prusia-vault

      - name: Fix path dependencies
        run: |
          sed -i 's|path = "../synapsis-core"|path = "synapsis-core"|' Cargo.toml
          sed -i 's|path = "../prusia-vault"|path = "prusia-vault"|' Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-synapsis-${{ hashFiles('Cargo.toml', 'synapsis-core/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-synapsis-

      - name: Check formatting
        run: cargo fmt -p synapsis -- --check

      - name: Clippy (lints)
        run: cargo clippy --all-targets -- -D warnings 2>&1 || true

      - name: Build (release)
        run: cargo build --release

      - name: Build (MCP server)
        run: cargo build --release --bin synapsis-mcp
