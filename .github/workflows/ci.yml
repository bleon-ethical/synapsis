name: CI/CD

on:
  push:
    branches: [main, master, clean]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-and-test:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: synapsis

      - uses: actions/checkout@v6
        with:
          repository: MethodWhite/synapsis-core
          path: synapsis-core
          ref: clean

      - uses: actions/checkout@v6
        with:
          repository: MethodWhite/prusia-vault
          path: prusia-vault
          ref: main

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94.0"
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y -q libssl-dev libsqlcipher-dev pkg-config
          sudo ldconfig
          echo "SQLCipher: $(pkg-config --libs sqlcipher)"
          echo "SQLCipher path: $(find /usr/lib -name 'libsqlcipher*' 2>/dev/null | head -3)"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: synapsis

      - name: Check formatting
        working-directory: synapsis
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: synapsis
        run: cargo clippy --all-targets

      - name: Compile check
        working-directory: synapsis
        run: cargo check --all-targets

      - name: Run tests
        working-directory: synapsis
        run: cargo test --lib

      - name: Security audit
        working-directory: synapsis
        continue-on-error: true
        run: |
          if ! command -v cargo-audit &> /dev/null; then
            cargo install cargo-audit --locked
          fi
          cargo audit \
            --ignore RUSTSEC-2021-0079 \
            --ignore RUSTSEC-2021-0078 \
            --ignore RUSTSEC-2024-0421 \
            --ignore RUSTSEC-2020-0071 \
            --ignore RUSTSEC-2022-0035 \
            --ignore RUSTSEC-2024-0375 \
            --ignore RUSTSEC-2020-0036 \
            --ignore RUSTSEC-2025-0119 \
            --ignore RUSTSEC-2024-0380 \
            --ignore RUSTSEC-2024-0381 \
            --ignore RUSTSEC-2025-0124 \
            --ignore RUSTSEC-2023-0081 \
            --ignore RUSTSEC-2021-0144 \
            --ignore RUSTSEC-2021-0145 \
            --ignore RUSTSEC-2019-0036 \
            --ignore RUSTSEC-2022-0022 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2020-0027 \
            || echo "::warning::New vulnerabilities found. Review and update dependencies."

  build:
    name: Build (${{ matrix.name }})
    needs: check-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            artifact: synapsis-linux-x86_64.tar.gz
            target: x86_64-unknown-linux-gnu

          - name: linux-latest
            os: ubuntu-latest
            artifact: synapsis-linux-x86_64-latest.tar.gz
            target: x86_64-unknown-linux-gnu

          - name: macos-x86_64
            os: macos-13
            artifact: synapsis-macos-x86_64.tar.gz
            target: x86_64-apple-darwin

          - name: macos-aarch64
            os: macos-latest
            artifact: synapsis-macos-aarch64.tar.gz
            target: aarch64-apple-darwin

          - name: windows-x86_64
            os: windows-latest
            artifact: synapsis-windows-x86_64.zip
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v6
        with:
          path: synapsis

      - uses: actions/checkout@v6
        with:
          repository: MethodWhite/synapsis-core
          path: synapsis-core
          ref: clean

      - uses: actions/checkout@v6
        with:
          repository: MethodWhite/prusia-vault
          path: prusia-vault
          ref: main

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libssl-dev libsqlcipher-dev 2>/dev/null || true
          sudo apt-get install -y libsqlite3-dev 2>/dev/null || true

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: synapsis

      - name: Build release
        working-directory: synapsis
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd synapsis/target/${{ matrix.target }}/release
          strip synapsis synapsis-mcp 2>/dev/null || true
          tar czf "${{ github.workspace }}/${{ matrix.artifact }}" synapsis synapsis-mcp

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd synapsis/target/${{ matrix.target }}/release
          strip synapsis synapsis-mcp 2>/dev/null || true
          tar czf "${{ github.workspace }}/${{ matrix.artifact }}" synapsis synapsis-mcp

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location synapsis/target/${{ matrix.target }}/release
          Compress-Archive -Path synapsis.exe, synapsis-mcp.exe -DestinationPath "${{ github.workspace }}/${{ matrix.artifact }}"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Show artifacts
        run: find artifacts -type f -ls

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
