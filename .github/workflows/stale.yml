# Stale — Closes inactive issues and PRs automatically
# Docs: https://github.com/actions/stale

name: Stale

on:
  schedule:
    - cron: "0 12 * * 1"  # Every Monday at noon

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          stale-issue-message: |
            This issue has been inactive for 60 days.
            If it's still relevant, please update it. Otherwise, it will be closed in 7 days.
          close-issue-message: |
            Closed due to inactivity. If the issue persists, please open a new one.
          stale-issue-label: "stale"
          days-before-issue-stale: 60
          days-before-issue-close: 7

          stale-pr-message: |
            This PR has been inactive for 30 days.
            Please update it or it will be closed in 7 days.
          close-pr-message: |
            PR closed due to inactivity.
          stale-pr-label: "stale"
          days-before-pr-stale: 30
          days-before-pr-close: 7

          exempt-issue-labels: "bug,enhancement,good first issue,help wanted,security"
          exempt-pr-labels: "bug,work-in-progress,security"
