name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build but do not publish'
        required: true
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} --bin synapsis --bin synapsis-mcp --bin synapsis-server
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release/synapsis
          for bin in synapsis synapsis-mcp synapsis-server; do
            cp "target/${{ matrix.target }}/release/$bin" release/synapsis/
            strip "release/synapsis/$bin" 2>/dev/null || true
          done
          cp README.md LICENSE release/synapsis/ 2>/dev/null || true
          cd release && tar czf "synapsis-${{ matrix.target }}.tar.gz" synapsis/
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p release/synapsis
          for bin in synapsis.exe synapsis-mcp.exe synapsis-server.exe; do
            cp "target/${{ matrix.target }}/release/$bin" release/synapsis/
          done
          cp README.md LICENSE release/synapsis/ 2>$null || $null
          Compress-Archive -Path release/synapsis -DestinationPath "release/synapsis-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: synapsis-${{ matrix.target }}
          path: release/synapsis-*
      - name: Upload to release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && !inputs.dry_run
        uses: softprops/action-gh-release@v2
        with:
          files: release/synapsis-*
          generate_release_notes: true
          fail_on_unmatched_files: false
