name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} --bin synapsis --bin synapsis-mcp --bin synapsis-server
        continue-on-error: ${{ matrix.target == 'x86_64-apple-darwin' }}
      - name: Package (Unix)
        if: runner.os != 'Windows' && success()
        run: |
          mkdir -p release/synapsis
          for bin in synapsis synapsis-mcp synapsis-server; do
            [ -f "target/${{ matrix.target }}/release/$bin" ] && cp "target/${{ matrix.target }}/release/$bin" release/synapsis/ || true
            strip "release/synapsis/$bin" 2>/dev/null || true
          done
          cp README.md LICENSE release/synapsis/ 2>/dev/null || true
          cd release && tar czf "synapsis-${{ matrix.target }}.tar.gz" synapsis/
      - name: Package (Windows)
        if: runner.os == 'Windows' && success()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release/synapsis | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/synapsis.exe" release/synapsis/ -ErrorAction SilentlyContinue
          Copy-Item "target/${{ matrix.target }}/release/synapsis-mcp.exe" release/synapsis/ -ErrorAction SilentlyContinue
          Copy-Item "target/${{ matrix.target }}/release/synapsis-server.exe" release/synapsis/ -ErrorAction SilentlyContinue
          Copy-Item README.md LICENSE release/synapsis/ -ErrorAction SilentlyContinue
          Compress-Archive -Path release/synapsis -DestinationPath "release/synapsis-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: synapsis-${{ matrix.target }}
          path: release/synapsis-*

  release:
    name: Create Release
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: synapsis-*
          path: release/
          merge-multiple: true
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls -la release/
          gh release create "${{ github.ref_name }}" \
            --title "Synapsis ${{ github.ref_name }}" \
            --notes "See the commit history for details." \
            release/*.tar.gz release/*.zip 2>/dev/null || \
          gh release upload "${{ github.ref_name }}" \
            release/*.tar.gz release/*.zip --clobber 2>/dev/null || true
