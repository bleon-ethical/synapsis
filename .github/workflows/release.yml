name: Release
on:
  push:
    tags: [v*, synapsis-v*]v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} --bin synapsis --bin synapsis-mcp --bin synapsis-server
      - name: Package (Unix)
        if: runner.os != 'Windows' && success()
        run: |
          mkdir -p release/synapsis
          for bin in synapsis synapsis-mcp synapsis-server; do
            src="target/${{ matrix.target }}/release/$bin"
            if [ -f "$src" ] && [ -s "$src" ]; then
              cp "$src" release/synapsis/
              file release/synapsis/"$bin"
            fi
          done
          ls -la release/synapsis/
          cp README.md LICENSE release/synapsis/ 2>/dev/null || true
          cd release && tar czf "synapsis-${{ matrix.target }}.tar.gz" synapsis/
      - name: Package (Windows)
        if: runner.os == 'Windows' && success()
        continue-on-error: true
        shell: pwsh
        run: |
          mkdir release/synapsis -Force > $null
          copy "target/${{ matrix.target }}/release/synapsis.exe" release/synapsis/ 2>$null
          copy "target/${{ matrix.target }}/release/synapsis-mcp.exe" release/synapsis/ 2>$null
          copy "target/${{ matrix.target }}/release/synapsis-server.exe" release/synapsis/ 2>$null
          copy README.md release/synapsis/ 2>$null
          copy LICENSE release/synapsis/ 2>$null
          Compress-Archive -Path release/synapsis -DestinationPath "release/synapsis-${{ matrix.target }}.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: synapsis-${{ matrix.target }}
          path: release/synapsis-*

  release:
    name: Create Release
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: synapsis-*
          path: release/
          merge-multiple: true
      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ls -la release/
          gh release create "${{ github.ref_name }}" \
            --title "Synapsis ${{ github.ref_name }}" \
            --generate-notes \
            release/*.tar.gz release/*.zip
