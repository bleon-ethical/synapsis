name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Publish Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Clone synapsis-core
        run: git clone --depth 1 https://github.com/MethodWhite/synapsis-core.git synapsis-core

      - name: Clone prusia-vault
        run: git clone --depth 1 https://github.com/MethodWhite/prusia-vault.git prusia-vault

      - name: Fix path dependencies
        run: |
          sed -i 's|path = "../synapsis-core"|path = "synapsis-core"|' Cargo.toml
          sed -i 's|path = "../prusia-vault"|path = "prusia-vault"|' Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-rel-${{ hashFiles('Cargo.toml') }}

      - name: Build synapsis
        run: cargo build --release --target ${{ matrix.target }} --bin synapsis --bin synapsis-mcp

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release/synapsis
          cp target/${{ matrix.target }}/release/synapsis release/synapsis/
          cp target/${{ matrix.target }}/release/synapsis-mcp release/synapsis/ 2>/dev/null || true
          cp install.sh release/synapsis/
          strip release/synapsis/synapsis release/synapsis/synapsis-mcp 2>/dev/null || true
          cd release && tar czf synapsis-${{ matrix.target }}.tar.gz synapsis/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p release/synapsis
          copy target\${{ matrix.target }}\release\synapsis.exe release\synapsis\
          copy target\${{ matrix.target }}\release\synapsis-mcp.exe release\synapsis\ 2>$null || true
          Compress-Archive -Path release\synapsis -DestinationPath release\synapsis-${{ matrix.target }}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/synapsis-*.tar.gz
            release/synapsis-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
