name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build & Publish Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-rel-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin synapsis --bin synapsis-mcp --bin synapsis-server

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p release/synapsis
          cp target/${{ matrix.target }}/release/synapsis release/synapsis/
          cp target/${{ matrix.target }}/release/synapsis-mcp release/synapsis/
          cp target/${{ matrix.target }}/release/synapsis-server release/synapsis/
          cp install.sh release/synapsis/
          cp README.md release/synapsis/
          strip release/synapsis/synapsis release/synapsis/synapsis-mcp release/synapsis/synapsis-server 2>/dev/null || true
          cd release && tar czf synapsis-${{ matrix.target }}.tar.gz synapsis/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir -p release/synapsis
          copy target\${{ matrix.target }}\release\synapsis.exe release\synapsis\
          copy target\${{ matrix.target }}\release\synapsis-mcp.exe release\synapsis\
          copy target\${{ matrix.target }}\release\synapsis-server.exe release\synapsis\
          copy install.ps1 release\synapsis\
          copy README.md release\synapsis\
          Compress-Archive -Path release\synapsis -DestinationPath release\synapsis-${{ matrix.target }}.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/synapsis-*.tar.gz
            release/synapsis-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
