# Prometheus Configuration for Synapsis
# ======================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional)
# rule_files:
#   - "first_rules.yml"

# Scrape configurations
scrape_configs:
  # Synapsis application metrics
  - job_name: 'synapsis'
    static_configs:
      - targets: ['synapsis-dev:7438']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (system metrics) - optional
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
