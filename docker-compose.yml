# Synapsis Development Environment
# ==================================
# Complete Docker setup for local development and testing

version: '3.8'

services:
  # Main Synapsis Development Container
  synapsis-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: synapsis-dev
    volumes:
      # Mount source code for hot-reload
      - .:/app
      # Mount cargo registry for faster builds
      - cargo-registry:/root/.cargo/registry
      # Mount cargo git for faster builds
      - cargo-git:/root/.cargo/git
      # Mount target directory
      - target:/app/target
      # Mount synapsis data
      - synapsis-data:/root/.local/share/synapsis
    environment:
      - RUST_LOG=info
      - RUST_BACKTRACE=1
      - SYNAPSIS_DATA_DIR=/root/.local/share/synapsis
    working_dir: /app
    command: cargo watch -x "build --release"
    networks:
      - synapsis-network
    ports:
      - "7438:7438"  # MCP TCP port
    depends_on:
      - synapsis-db

  # Database (for testing if needed)
  synapsis-db:
    image: postgres:15-alpine
    container_name: synapsis-db
    environment:
      - POSTGRES_USER=synapsis
      - POSTGRES_PASSWORD=synapsis_dev_password
      - POSTGRES_DB=synapsis_test
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - synapsis-network
    ports:
      - "5432:5432"

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: synapsis-prometheus
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - synapsis-network
    ports:
      - "9090:9090"
    depends_on:
      - synapsis-dev

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: synapsis-grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=synapsis_admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - synapsis-network
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Redis for caching/session management (optional)
  redis:
    image: redis:7-alpine
    container_name: synapsis-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - synapsis-network
    ports:
      - "6379:6379"

networks:
  synapsis-network:
    driver: bridge

volumes:
  cargo-registry:
  cargo-git:
  target:
  synapsis-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  redis-data:
